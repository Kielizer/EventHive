<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../css/signupForm.css">
</head>
<body>

<form id="signupForm" class="signupForm">
    <h2>Sign Up</h2>
    <input id="email" type="email" placeholder="Email" required>
    <input id="password" type="password" placeholder="Password" minlength="8" maxlength="16" required>
    <input id="confirmPassword" type="password" placeholder="Confirm Password" minlength="8" maxlength="16" required>
    <button type="submit" class="button">Sign Up</button>
    <p>Already have an account? <a href="login.html">Login</a></p>
</form>


</body>
</html>
