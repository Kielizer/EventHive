<div class="crud_container">


    <form id="appointmentForm" class="form">

      <h1>Appointment Form</h1>

    <input type="text" id="fullName" required placeholder="Patient Full Name">
    <input type="text" id="contact" maxlength="11" required placeholder="Contact Number">
    <input type="text" id="address" required placeholder="Address">
    <input type="date" id="date" required>
    <input type="time" id="time" required>

</form>
